name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Configure private modules
        run: |
          echo "machine github.com login x-access-token password ${GH_PAT}" >> "${HOME}/.netrc"
          chmod 600 "${HOME}/.netrc"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GOPRIVATE: github.com/pidgr/*

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: v2.14.1
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOPRIVATE: github.com/pidgr/*

      - name: Cleanup credentials
        if: always()
        run: rm -f "${HOME}/.netrc"

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [goreleaser]
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      ECS_CLUSTER: pidgr-production
      ECS_SERVICE: pidgr-mcp-production
      TASK_FAMILY: pidgr-mcp-production
    steps:
      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Update task definition with new image
        id: task-def
        run: |
          # Fetch current task definition
          aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" \
            --query 'taskDefinition' > task-def.json

          # Update the container image to the versioned tag
          VERSION="${{ steps.version.outputs.tag }}"
          jq --arg IMAGE "ghcr.io/pidgr/pidgr-mcp:${VERSION}" \
            '.containerDefinitions[0].image = $IMAGE' task-def.json > updated.json

          # Register new task definition revision (strip fields ECS doesn't accept)
          NEW_ARN=$(jq -r '{
            family,
            taskRoleArn,
            executionRoleArn,
            networkMode,
            containerDefinitions,
            requiresCompatibilities,
            cpu,
            memory
          }' updated.json | aws ecs register-task-definition \
            --cli-input-json file:///dev/stdin \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task_definition_arn=$NEW_ARN" >> "$GITHUB_OUTPUT"
          echo "Registered new task definition: $NEW_ARN"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "${{ steps.task-def.outputs.task_definition_arn }}" \
            --query 'service.serviceName' \
            --output text

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"

      - name: Smoke test
        run: |
          curl -sf https://mcp.pidgr.com/.well-known/oauth-protected-resource > /dev/null
          echo "MCP health check passed"
